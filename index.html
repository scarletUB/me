<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --glass:     rgba(18, 16, 38, 0.42);
      --glass-bd:  rgba(140, 130, 220, 0.25);
      --text-main: rgba(245, 245, 255, 0.94);
      --text-dim:  rgba(200, 195, 240, 0.82);
      --accent:    rgba(160, 140, 255, 0.75);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #05040f;
      background-image: var(--body-bg-image, none);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    .profile-header {
      height: 180px;
      background: linear-gradient(to bottom, rgba(10,8,30,0.45), rgba(5,4,15,0.88)),
                  url('') center/cover no-repeat;
      position: relative;
      z-index: 1;
      border-radius: 0 0 32px 32px;
      overflow: hidden;
      animation: subtleBreathe 12s ease-in-out infinite;
    }

    @keyframes subtleBreathe {
      0%,100% { transform: scale(1.00); }
      50%     { transform: scale(1.015); }
    }

    @media (min-width: 640px)  { .profile-header { height: 220px; } }
    @media (min-width: 768px)  { .profile-header { height: 280px; } }
    @media (min-width: 1024px) { .profile-header { height: 340px; } }

    .avatar-wrapper {
      position: relative;
      z-index: 2;
      margin-top: -70px;
      margin-bottom: 16px;
    }

    @media (min-width: 640px)  { .avatar-wrapper { margin-top: -90px; } }
    @media (min-width: 768px)  { .avatar-wrapper { margin-top: -110px; } }

    .avatar {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid rgba(12,10,35,0.9);
      box-shadow: 0 0 35px rgba(0,0,0,0.55), inset 0 2px 10px rgba(255,255,255,0.08);
      transition: all 0.4s ease;
    }

    @media (min-width: 640px)  { .avatar { width: 140px; height: 140px; } }
    @media (min-width: 768px)  { .avatar { width: 160px; height: 160px; } }

    .avatar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px rgba(160,140,255,0.6), inset 0 2px 12px rgba(255,255,255,0.15);
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px 12px;
      flex-wrap: wrap;
    }

    .badge-icon {
      font-size: 1.4rem;
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .badge-icon:hover {
      transform: scale(1.25) rotate(10deg);
    }

    .gradient-badge {
      background: linear-gradient(45deg, #a78bfa, #7dd3fc, #f472b6, #a78bfa);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientFlow 6s ease infinite;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .neon-glow {
      text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 20px rgba(255,255,255,0.2);
      animation: neonFlicker 8s infinite alternate;
    }

    @keyframes neonFlicker {
      0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 20px rgba(255,255,255,0.2); }
      30%      { text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 30px rgba(255,255,255,0.3); }
      60%      { text-shadow: 0 0 8px  rgba(255,255,255,0.3), 0 0 15px rgba(255,255,255,0.15); }
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-bd);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .glass.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hashtag-capsule, .link-capsule {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      margin: 4px 6px;
      background: rgba(60, 50, 140, 0.22);
      border: 1px solid transparent;
      border-radius: 9999px;
      backdrop-filter: blur(10px);
      font-weight: 500;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .hashtag-capsule:hover, .link-capsule:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: rgba(25, 20, 55, 0.88);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-bd);
      color: white;
      padding: 14px 28px;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 90vw;
      font-size: 1rem;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-12px);
    }

    #toast i {
      width: 22px;
      height: 22px;
    }

    .footer {
      background: var(--glass);
      border-top: 1px solid var(--glass-bd);
      backdrop-filter: blur(20px);
      padding: 1.5rem 0;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div id="toast"></div>

<div class="relative z-10 min-h-screen flex flex-col">

  <div class="profile-header" id="headerBg"></div>

  <div class="max-w-2xl mx-auto px-4 sm:px-6 pb-12 flex-1">

    <div class="avatar-wrapper flex justify-center">
      <img id="avatarImg" class="avatar" src="" alt="avatar">
    </div>

    <div class="text-center space-y-3 mb-10">
      <div class="name-row">
        <h1 id="usernameEl" class="title text-3xl sm:text-4xl md:text-5xl neon-glow"></h1>
        <div id="badgesContainer" class="flex items-center gap-3"></div>
      </div>

      <div id="statusEl" class="status-text text-lg sm:text-xl neon-glow"></div>

      <div id="hashtagsContainer" class="flex flex-wrap justify-center gap-2"></div>
    </div>

    <div class="glass p-6 sm:p-8 mb-8" id="aboutBlock">
      <h2 class="text-xl sm:text-2xl font-medium mb-4 flex items-center gap-3 text-[rgba(220,210,255,0.92)] neon-glow">
        <i data-lucide="user" class="w-6 h-6"></i>
        О себе
      </h2>
      <div id="bioEl" class="text-base sm:text-lg leading-relaxed"></div>
    </div>

    <div class="glass p-6 sm:p-8 mb-12" id="linksBlock">
      <h2 class="text-xl sm:text-2xl font-medium mb-5 flex items-center gap-3 text-[rgba(220,210,255,0.92)] neon-glow">
        <i data-lucide="link" class="w-6 h-6"></i>
        Связь
      </h2>
      <div id="linksContainer" class="text-base sm:text-lg leading-relaxed space-y-2"></div>
    </div>

  </div>

  <footer class="footer mt-auto">
    <div class="max-w-2xl mx-auto px-5 text-center text-sm text-[rgba(190,180,230,0.8)]">
      <p>SCARLET_USER • 2026</p>
      <p class="mt-1">
        <a href="https://t.me/hubsscarlet" target="_blank">hubsscarlet</a>
      </p>
    </div>
  </footer>

</div>

<script>
// ─── КОНФИГ ────────────────────────────────────────────────
const config = {
  username: "SCARLET_USER",
  status: "Разработчик ботов и интерфейсов • Python • Telegram • Web3 #Python #Developer #Scarlet #Osint",
  bio: `Привет. Пишу ботов, сайты, интеграции.\nЛюблю чистый код и тёмный режим.\n\nTG: @hubsscarlet\nGitHub: github.com/scarlet-dev\nПоддержка: @scarlet_support`,
  avatar: "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjFuMmZ2eWhpY3N3NXA5aDVpeDJ6aGJzOTlncHFjYnU1NHBzMnhlNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/4ilFRqgbzbx4c/giphy.gif",
  header: "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExajNseml1anhyemtkNDE2Z29lbWQxN2JhM2ZiaTB3cGFrZ2lxdWVyaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/FeVg8ViEczcxG/giphy.gif",
  background: "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExczd2OXh5Z3RhN2pxcHFiNW03NHBiNHZmc2hycWhzaTNmdnozMXFyeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aRZ4vTsHnyW6A/giphy.gif",

  showVerified: true,
  showFlame:    true,

  badges: [
    {
      type: "verified",
      icon: "check-circle",
      color: "#a78bfa",
      message: "Является разработчиком.",
      duration: 2200
    },
    {
      type: "flame",
      icon: "flame",
      color: "#f87171",
      message: "Доверенный пользователь.",
      duration: 2800
    }
  ],

  connectionText: `
Telegram-https://t.me/hubsscarlet
GitHub-https://github.com/scarlet-dev
Support-https://t.me/scarlet_support
Просто текст без ссылки
Ещё одна строка-https://example.com
  `.trim()
};

// ─── Применение настроек ────────────────────────────────────
document.body.style.setProperty('--body-bg-image', `url('${config.background}')`);
document.getElementById("headerBg").style.backgroundImage = 
  `linear-gradient(to bottom, rgba(10,8,30,0.4), rgba(5,4,15,0.85)), url('${config.header}')`;
document.getElementById("avatarImg").src = config.avatar;
document.getElementById("usernameEl").textContent = config.username;

// Статус + хештеги (теперь точно видны)
let statusText = config.status;
const hashtags = statusText.match(/#[\wа-яА-ЯёЁ]+/gi) || [];
statusText = statusText.replace(/#[\wа-яА-ЯёЁ]+/gi, '').trim();
document.getElementById("statusEl").textContent = statusText;

// Хештеги под статусом — капсулы с рандомным цветом и кликом
const colors = ['#a78bfa', '#7dd3fc', '#f472b6', '#6ee7b7', '#fcd34d', '#fca5a5', '#c084fc', '#60a5fa'];
const hashtagsDiv = document.getElementById("hashtagsContainer");
hashtags.forEach(tag => {
  const clean = tag.substring(1);
  const color = colors[Math.floor(Math.random() * colors.length)];
  const span = document.createElement("span");
  span.className = "hashtag-capsule px-4 py-1.5 text-sm sm:text-base cursor-pointer";
  span.style.color = color;
  span.style.borderColor = color + '40';
  span.textContent = clean;
  span.addEventListener("click", () => {
    showToast(`Пользователь занимается — ${clean}`, color, 2200);
  });
  hashtagsDiv.appendChild(span);
});

// Био — без капсул (простые ссылки)
let bioHtml = config.bio
  .replace(/\n/g, '<br>')
  .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" class="text-[rgba(160,140,255,0.9)] hover:underline">$1</a>')
  .replace(/@[\w]+/g, match => {
    const url = match === '@hubsscarlet' ? 'https://t.me/hubsscarlet' : '#';
    return `<a href="${url}" target="_blank" class="text-[rgba(160,140,255,0.9)] hover:underline">${match}</a>`;
  });
document.getElementById("bioEl").innerHTML = bioHtml;

// Блок "Связь" — текст + капсулы для ссылок
const linksContainer = document.getElementById("linksContainer");
const connectionLines = config.connectionText.split('\n').filter(line => line.trim());

connectionLines.forEach(line => {
  line = line.trim();
  if (line.includes('-')) {
    const parts = line.split('-');
    const text = parts[0].trim();
    const url = parts.slice(1).join('-').trim();
    if (url.startsWith('http')) {
      const a = document.createElement("a");
      a.href = url;
      a.target = "_blank";
      a.className = "link-capsule px-5 py-2 inline-block my-1.5 text-sm sm:text-base";
      a.textContent = text;
      linksContainer.appendChild(a);
      return;
    }
  }
  const p = document.createElement("p");
  p.className = "my-1.5 text-sm sm:text-base";
  p.textContent = line;
  linksContainer.appendChild(p);
});

// Бейджи — отображаются только если включены в конфиге
const badgesContainer = document.getElementById("badgesContainer");

config.badges.forEach(badgeConfig => {
  if ((badgeConfig.type === "verified" && !config.showVerified) ||
      (badgeConfig.type === "flame" && !config.showFlame)) {
    return;
  }

  const badge = document.createElement("span");
  badge.innerHTML = `<i data-lucide="${badgeConfig.icon}" class="badge-icon gradient-badge" style="color: ${badgeConfig.color};"></i>`;
  badge.style.cursor = "pointer";
  badge.title = `Нажми, чтобы увидеть: ${badgeConfig.message}`;

  badge.addEventListener("click", (e) => {
    e.stopPropagation();
    showToast(badgeConfig.message, badgeConfig.color, badgeConfig.duration || 2200);
  });

  badgesContainer.appendChild(badge);
});

// Функция уведомления
function showToast(message, color, duration = 2200) {
  const toast = document.getElementById("toast");

  toast.innerHTML = `
    <i data-lucide="check-circle" style="color: ${color};"></i>
    <span>${message}</span>
  `;

  toast.style.borderColor = `${color}40`;
  toast.classList.add("visible");
  lucide.createIcons({ icons: toast });

  setTimeout(() => {
    toast.classList.remove("visible");
    setTimeout(() => { toast.innerHTML = ""; }, 500);
  }, duration);
}

// Закрытие по клику вне
document.addEventListener("click", (e) => {
  const toast = document.getElementById("toast");
  if (toast.classList.contains("visible") && !toast.contains(e.target)) {
    toast.classList.remove("visible");
    setTimeout(() => { toast.innerHTML = ""; }, 500);
  }
});

// Анимация появления блоков
const blocks = document.querySelectorAll('.glass, .footer');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.1 });

blocks.forEach(block => observer.observe(block));

lucide.createIcons();
</script>

</body>
</html>
