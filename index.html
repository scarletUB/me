<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #05040f;
      background-image: var(--body-bg-image, none);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    :root {
      --text-main:      rgba(245, 245, 255, 0.92);
      --text-dim:       rgba(200, 195, 240, 0.78);
      --glass:          var(--config-glass, rgba(18, 16, 38, 0.38));
      --glass-border:   var(--config-glass-border, rgba(140, 130, 220, 0.22));
      --verified-icon:  var(--config-verified-icon, #a08cff);
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .profile-header {
      height: 280px;
      background: 
        linear-gradient(to bottom, rgba(10,8,30,0.4), rgba(5,4,15,0.85)),
        url('') center / cover no-repeat;
      position: relative;
      z-index: 1;
      border-radius: 0 0 36px 36px;
    }

    .avatar {
      width: 168px;
      height: 168px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid rgba(12,10,35,0.85);
      box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 2px 8px rgba(255,255,255,0.05);
      animation: neonPulse 5s ease-in-out infinite alternate;
    }

    @keyframes neonPulse {
      0%   { box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 0 4px rgba(160,140,255,0.15); }
      50%  { box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 30px 10px rgba(160,140,255,0.45); }
      100% { box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 15px 6px rgba(160,140,255,0.7); }
    }

    .title {
      font-family: 'Orbitron', monospace;
      font-size: 2.8rem;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(140,120,240,0.5);
    }

    .hashtag-capsule, .link-capsule {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      margin: 4px 5px;
      background: rgba(60, 50, 140, 0.25);
      border: 1px solid var(--glass-border);
      border-radius: 9999px;
      color: rgba(210, 200, 255, 0.88);
      backdrop-filter: blur(10px);
      transition: all 0.28s ease;
      text-decoration: none;
    }

    .hashtag-capsule:hover, .link-capsule:hover {
      background: rgba(90, 80, 180, 0.4);
      border-color: var(--verified-icon);
      color: white;
      transform: translateY(-1px) scale(1.03);
    }

    .footer {
      background: var(--glass);
      border-top: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      padding: 1.5rem 0;
      margin-top: 4rem;
    }

    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: rgba(25, 20, 55, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 14px 28px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 90vw;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }

    #toast i {
      width: 22px;
      height: 22px;
      color: var(--verified-icon);
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div id="toast"></div>

<div class="relative z-10 min-h-screen flex flex-col">

  <div class="profile-header" id="headerBg"></div>

  <div class="max-w-2xl mx-auto px-5 pb-12 flex-1">

    <div class="avatar-wrapper flex justify-center">
      <img id="avatarImg" class="avatar" src="" alt="avatar">
    </div>

    <div class="text-center space-y-4 mb-10">
      <h1 id="usernameEl" class="title"></h1>
      <div id="statusEl" class="status-text"></div>
      <div id="hashtagsContainer" class="flex flex-wrap justify-center"></div>
    </div>

    <div class="glass p-7 mb-8">
      <h2 class="text-xl font-medium mb-4 flex items-center gap-2" style="color: var(--text-dim);">
        <i data-lucide="user" class="w-5 h-5"></i>
        О себе
      </h2>
      <div id="bioEl" class="leading-relaxed text-[1.05rem]"></div>
    </div>

    <div class="glass p-7 mb-12">
      <h2 class="text-xl font-medium mb-5 flex items-center gap-2" style="color: var(--text-dim);">
        <i data-lucide="link" class="w-5 h-5"></i>
        Связь
      </h2>
      <div id="linksContainer" class="flex flex-wrap justify-center"></div>
    </div>

  </div>

  <footer class="footer mt-auto">
    <div class="max-w-2xl mx-auto px-5 text-center text-sm text-[rgba(190,180,230,0.75)]">
      <p>SCARLET_USER • 2026</p>
      <p class="mt-1">
        <a href="https://t.me/hubsscarlet" target="_blank">hubsscarlet</a>
      </p>
    </div>
  </footer>

</div>

<script>
// ─── КОНФИГ ────────────────────────────────────────────────
const config = {
  title:              "SCARLET_USER | Premium Developer",
  username:           "SCARLET_USER",
  status:             "Разработчик ботов и интерфейсов • Python • Telegram • Web3 #Python #BotDev",
  bio:                `Привет. Пишу ботов, сайты, интеграции.\nЛюблю чистый код и тёмный режим.\n\nTG: @hubsscarlet\nGitHub: github.com/scarlet-dev\nПоддержка: @scarlet_support`,
  avatar:             "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjFuMmZ2eWhpY3N3NXA5aDVpeDJ6aGJzOTlncHFjYnU1NHBzMnhlNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/4ilFRqgbzbx4c/giphy.gif",
  header:             "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExajNseml1anhyemtkNDE2Z29lbWQxN2JhM2ZiaTB3cGFrZ2lxdWVyaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/FeVg8ViEczcxG/giphy.gif",
  background:         "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExczd2OXh5Z3RhN2pxcHFiNW03NHBiNHZmc2hycWhzaTNmdnozMXFyeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aRZ4vTsHnyW6A/giphy.gif",

  // Новые настраиваемые цвета
  glassBg:            "rgba(18, 16, 38, 0.38)",          // фон стеклянных блоков
  glassBorder:        "rgba(140, 130, 220, 0.35)",       // граница стекла и toast
  verifiedIconColor:  "#a08cff",                         // цвет иконки галочки (верификация)

  verified:           true,
  verifiedMessage:    "Верифицированный пользователь SCARLET\nПользователь является разработчиком.",

  socialLinks: [
    { text: "Telegram", url: "https://t.me/hubsscarlet", icon: "send" },
    { text: "GitHub", url: "https://github.com/scarlet-dev", icon: "github" },
    { text: "Support", url: "https://t.me/scarlet_support", icon: "help-circle" }
  ]
};

// ─── Применение цветов из конфига ──────────────────────────
document.documentElement.style.setProperty('--config-glass', config.glassBg);
document.documentElement.style.setProperty('--config-glass-border', config.glassBorder);
document.documentElement.style.setProperty('--config-verified-icon', config.verifiedIconColor);

// ─── Применение остальных настроек ─────────────────────────
document.title = config.title;
document.body.style.setProperty('--body-bg-image', `url('${config.background}')`);
document.getElementById("headerBg").style.backgroundImage = 
  `linear-gradient(to bottom, rgba(10,8,30,0.4), rgba(5,4,15,0.85)), url('${config.header}')`;
document.getElementById("avatarImg").src = config.avatar;
document.getElementById("usernameEl").textContent = config.username;

// Статус + хештеги
let statusText = config.status;
const hashtags = statusText.match(/#[\wа-яА-ЯёЁ]+/gi) || [];
statusText = statusText.replace(/#[\wа-яА-ЯёЁ]+/gi, '').trim();
document.getElementById("statusEl").textContent = statusText;

const hashtagsDiv = document.getElementById("hashtagsContainer");
hashtags.forEach(tag => {
  const clean = tag.substring(1);
  const span = document.createElement("span");
  span.className = "hashtag-capsule";
  span.textContent = clean;
  hashtagsDiv.appendChild(span);
});

// Био
let bioHtml = config.bio
  .replace(/\n/g, '<br>')
  .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" class="link-capsule" target="_blank">$1</a>')
  .replace(/@[\w]+/g, match => {
    const url = match === '@hubsscarlet' ? 'https://t.me/hubsscarlet' : '#';
    return `<a href="${url}" class="link-capsule" target="_blank">${match}</a>`;
  });
document.getElementById("bioEl").innerHTML = bioHtml;

// Блок связи
const linksDiv = document.getElementById("linksContainer");
config.socialLinks.forEach(link => {
  const a = document.createElement("a");
  a.href = link.url;
  a.target = "_blank";
  a.className = "link-capsule px-5 py-2.5 mx-1.5 my-1.5";
  a.innerHTML = `<i data-lucide="${link.icon}" class="w-4 h-4 mr-1.5"></i>${link.text}`;
  linksDiv.appendChild(a);
});

// Верификация + уведомление (исчезает через 2 секунды)
if (config.verified) {
  const badge = document.createElement("span");
  badge.innerHTML = ` <i data-lucide="check-circle" class="inline w-5 h-5 cursor-pointer" style="color: ${config.verifiedIconColor};"></i>`;
  badge.style.cursor = "pointer";
  badge.title = "Нажми, чтобы показать статус верификации";

  let hideTimer = null;

  badge.addEventListener("click", () => {
    const toast = document.getElementById("toast");

    if (hideTimer) clearTimeout(hideTimer);

    toast.innerHTML = `
      <i data-lucide="check-circle"></i>
      <span>${config.verifiedMessage}</span>
    `;

    toast.classList.add("visible");
    lucide.createIcons({ icons: toast });

    hideTimer = setTimeout(() => {
      toast.classList.remove("visible");
      setTimeout(() => {
        toast.innerHTML = "";
      }, 450);
    }, 2000); // ← 2 секунды
  });

  document.getElementById("usernameEl").appendChild(badge);
}

lucide.createIcons();
</script>

</body>
</html>
