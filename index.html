<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bf00ff;
            --neon-blue: #0066ff;
            --glass-bg: rgba(10, 10, 15, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000000;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Grid Animation Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .grid-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, #000000 70%);
        }

        /* Glass Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Neon Glow Effects */
        .neon-text {
            text-shadow: 
                0 0 5px var(--neon-cyan),
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
        }

        .neon-border {
            box-shadow: 
                0 0 5px var(--neon-cyan),
                0 0 10px var(--neon-cyan),
                inset 0 0 5px rgba(0, 245, 255, 0.1);
        }

        .neon-pink-text {
            text-shadow: 
                0 0 5px var(--neon-pink),
                0 0 10px var(--neon-pink),
                0 0 20px var(--neon-pink);
        }

        .neon-purple-text {
            text-shadow: 
                0 0 5px var(--neon-purple),
                0 0 10px var(--neon-purple),
                0 0 20px var(--neon-purple);
        }

        /* Header */
        .profile-header {
            border-radius: 0 0 50px 50px;
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.1) 0%, rgba(191, 0, 255, 0.1) 100%);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
            animation: headerPulse 3s ease-in-out infinite;
        }

        @keyframes headerPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 245, 255, 0.3); }
            50% { box-shadow: 0 0 50px rgba(0, 245, 255, 0.5), 0 0 80px rgba(191, 0, 255, 0.3); }
        }

        /* Avatar */
        .avatar-container {
            position: relative;
            margin-top: -80px;
            animation: avatarFloat 4s ease-in-out infinite;
        }

        @keyframes avatarFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan),
                inset 0 0 20px rgba(0, 245, 255, 0.3);
            animation: avatarGlow 2s ease-in-out infinite alternate;
        }

        @keyframes avatarGlow {
            0% { box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan); }
            100% { box-shadow: 0 0 30px var(--neon-pink), 0 0 60px var(--neon-pink); }
        }

        /* Checkmark */
        .verified-badge {
            color: var(--neon-cyan);
            filter: drop-shadow(0 0 5px var(--neon-cyan));
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon-cyan)); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 10px var(--neon-cyan)); }
        }

        /* Status */
        .status {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: statusShimmer 3s linear infinite;
        }

        @keyframes statusShimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Info Block */
        .info-block {
            animation: infoFadeIn 1s ease-out;
        }

        @keyframes infoFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Social Buttons */
        .social-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 10px 30px rgba(0, 245, 255, 0.4),
                0 0 20px var(--neon-cyan);
        }

        /* Footer */
        .footer-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .footer-link {
            color: var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .footer-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            transform: scale(1.1);
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 15s infinite;
            opacity: 0.5;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-header {
                border-radius: 0 0 30px 30px;
            }
            .avatar {
                width: 120px;
                height: 120px;
            }
            .avatar-container {
                margin-top: -60px;
            }
        }

        /* Name style */
        .user-name {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .verified-pc {
            display: inline-flex;
            align-items: center;
        }

        @media (max-width: 768px) {
            .verified-pc {
                display: inline-flex;
            }
        }
    </style>
</head>
<body class="text-white">
    <!-- Grid Background -->
    <div class="grid-bg"></div>

    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 8s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 10s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 14s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 16s;"></div>

    <!-- Main Content -->
    <div class="relative z-10 min-h-screen flex flex-col">
        <!-- Header -->
        <div class="profile-header h-48 md:h-64 relative">
            <div class="absolute inset-0 flex items-center justify-center opacity-30">
                <i data-lucide="grid" class="w-32 h-32 text-cyan-400"></i>
            </div>
        </div>

        <!-- Profile Content -->
        <div class="flex-1 max-w-2xl mx-auto w-full px-4 pb-8">
            <!-- Avatar -->
            <div class="avatar-container flex justify-center">
                <img src="http://static.photos/technology/150x150/42" alt="Avatar" class="avatar object-cover">
            </div>

            <!-- Name and Status -->
            <div class="text-center mt-6 space-y-2">
                <div class="flex items-center justify-center gap-2">
                    <span id="verifiedBadge" class="hidden verified-pc">
                        <i data-lucide="badge-check" class="w-6 h-6 verified-badge"></i>
                    </span>
                    <h1 class="user-name text-3xl md:text-4xl font-bold neon-text">SCARLET_USER</h1>
                    <span id="verifiedBadgeAfter" class="hidden">
                        <i data-lucide="badge-check" class="w-6 h-6 verified-badge"></i>
                    </span>
                </div>
                <p class="status text-lg md:text-xl font-semibold bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 bg-clip-text text-transparent">
                    ✨ Premium Developer ✨
                </p>
            </div>

            <!-- About Me Block -->
            <div id="aboutBlock" class="info-block glass rounded-2xl p-6 mt-8 neon-border">
                <h2 class="text-xl font-bold mb-3 flex items-center gap-2 text-cyan-400">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    О себе
                </h2>
                <p class="text-gray-300 leading-relaxed">
                    Привет! Я разработчик ботов и веб-приложений. Специализируюсь на создании современных UI/UX решений и интеграциях с Telegram API. Всегда открыт к интересным проектам! 🚀
                </p>
            </div>

            <!-- Social Buttons -->
            <div class="info-block glass rounded-2xl p-6 mt-6 neon-border">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-cyan-400">
                    <i data-lucide="share-2" class="w-5 h-5"></i>
                    Социальные сети
                </h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <!-- VK -->
                    <a href="#" class="social-btn glass rounded-xl p-4 flex flex-col items-center gap-2 text-blue-400 hover:text-blue-300 border border-blue-500/30">
                        <i data-lucide="message-circle" class="w-8 h-8"></i>
                        <span class="font-semibold">VKontakte</span>
                    </a>
                    <!-- Telegram -->
                    <a href="#" class="social-btn glass rounded-xl p-4 flex flex-col items-center gap-2 text-cyan-400 hover:text-cyan-300 border border-cyan-500/30">
                        <i data-lucide="send" class="w-8 h-8"></i>
                        <span class="font-semibold">Telegram</span>
                    </a>
                    <!-- Me -->
                    <a href="#" class="social-btn glass rounded-xl p-4 flex flex-col items-center gap-2 text-purple-400 hover:text-purple-300 border border-purple-500/30">
                        <i data-lucide="user-circle" class="w-8 h-8"></i>
                        <span class="font-semibold">Me</span>
                    </a>
                    <!-- GitHub -->
                    <a href="#" class="social-btn glass rounded-xl p-4 flex flex-col items-center gap-2 text-gray-400 hover:text-gray-300 border border-gray-500/30">
                        <i data-lucide="github" class="w-8 h-8"></i>
                        <span class="font-semibold">GitHub</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="glass mt-auto border-t border-purple-500/30">
            <div class="max-w-2xl mx-auto px-4 py-6">
                <div class="flex items-center justify-center gap-4">
                    <img src="http://static.photos/technology/50x50/42" alt="Footer Avatar" class="footer-avatar">
                    <div class="text-center">
                        <p class="text-lg font-bold text-purple-400 neon-purple-text">SCARLET USER BOT</p>
                        <p class="footer-link text-sm mt-1" onclick="window.open('https://t.me/hubsscarlet', '_blank')">
                            SCARLET 2026
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // User data (simulated)
        const userData = {
            name: 'SCARLET_USER',
            status: '✨ Premium Developer ✨',
            about: 'Привет! Я разработчик ботов и веб-приложений. Специализируюсь на создании современных UI/UX решений и интеграциях с Telegram API. Всегда открыт к интересным проектам! 🚀',
            verified: 1, // Set to 0 to hide verified badge
            socials: {
                vk: '#',
                telegram: '#',
                me: '#',
                github: '#'
            }
        };

        // Handle verified badge
        const verifiedBadge = document.getElementById('verifiedBadge');
        const verifiedBadgeAfter = document.getElementById('verifiedBadgeAfter');

        function updateVerifiedBadge() {
            const isPC = window.innerWidth >= 768;
            
            if (userData.verified === 1) {
                if (isPC) {
                    verifiedBadge.classList.remove('hidden');
                    verifiedBadgeAfter.classList.add('hidden');
                } else {
                    verifiedBadge.classList.add('hidden');
                    verifiedBadgeAfter.classList.remove('hidden');
                }
            } else {
                verifiedBadge.classList.add('hidden');
                verifiedBadgeAfter.classList.add('hidden');
            }
        }

        // Initial check
        updateVerifiedBadge();

        // Update on resize
        window.addEventListener('resize', updateVerifiedBadge);

        // Handle about block visibility
        const aboutBlock = document.getElementById('aboutBlock');
        if (!userData.about || userData.about.trim() === '') {
            aboutBlock.style.display = 'none';
        }

        // Add mouse parallax effect to grid
        document.addEventListener('mousemove', (e) => {
            const grid = document.querySelector('.grid-bg');
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            grid.style.transform = `perspective(500px) rotateX(60deg) translateX(${x}px) translateY(${y}px)`;
        });

        // Add click effect to buttons
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
                ripple.classList.add('absolute', 'rounded-full', 'bg-white/30', 'animate-ping');
                
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 500);
            });
        });

        // Console Easter Egg
        console.log('%c🔮 SCARLET USER BOT 🔮', 'font-size: 24px; color: #00f5ff; text-shadow: 0 0 10px #00f5ff;');
        console.log('%cCreated with ❤️ by SCARLET 2026', 'font-size: 14px; color: #bf00ff;');
    </script>
</body>
</html>
