<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --glass:     rgba(18, 16, 38, 0.42);
      --glass-bd:  rgba(140, 130, 220, 0.25);
      --text-main: rgba(245, 245, 255, 0.94);
      --text-dim:  rgba(200, 195, 240, 0.82);
      --accent:    rgba(160, 140, 255, 0.75);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #05040f;
      background-image: var(--body-bg-image, none);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    .profile-header {
      height: 220px;
      background: linear-gradient(to bottom, rgba(10,8,30,0.45), rgba(5,4,15,0.88)),
                  url('') center/cover no-repeat;
      position: relative;
      z-index: 1;
      border-radius: 0 0 32px 32px;
      overflow: hidden;
      transition: all 0.6s ease;
    }

    @media (min-width: 768px) {
      .profile-header {
        height: 320px;
      }
    }

    .avatar-wrapper {
      position: relative;
      z-index: 2;
      margin-top: -90px;
      margin-bottom: 20px;
    }

    @media (min-width: 768px) {
      .avatar-wrapper {
        margin-top: -120px;
      }
    }

    .avatar {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid rgba(12,10,35,0.9);
      box-shadow: 0 0 35px rgba(0,0,0,0.55), inset 0 2px 10px rgba(255,255,255,0.08);
      transition: all 0.4s ease;
    }

    .avatar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px rgba(160,140,255,0.5), inset 0 2px 10px rgba(255,255,255,0.12);
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .verified-badge {
      color: var(--accent);
      transition: transform 0.3s ease;
    }

    .verified-badge:hover {
      transform: scale(1.2);
    }

    .hashtag-capsule {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      margin: 4px 6px;
      background: rgba(60, 50, 140, 0.22);
      border: 1px solid transparent;
      border-radius: 9999px;
      backdrop-filter: blur(10px);
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .hashtag-capsule:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }

    .link-capsule:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }

    .footer {
      background: var(--glass);
      border-top: 1px solid var(--glass-bd);
      backdrop-filter: blur(20px);
      padding: 1.5rem 0;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>

<div id="toast"></div>

<div class="relative z-10 min-h-screen flex flex-col">

  <div class="profile-header" id="headerBg"></div>

  <div class="max-w-2xl mx-auto px-4 sm:px-6 pb-12 flex-1">

    <div class="avatar-wrapper flex justify-center">
      <img id="avatarImg" class="avatar" src="" alt="avatar">
    </div>

    <div class="text-center space-y-3 mb-10">
      <div class="name-row">
        <h1 id="usernameEl" class="title text-3xl sm:text-4xl md:text-5xl"></h1>
        <span id="verifiedBadge" class="verified-badge hidden text-2xl sm:text-3xl"></span>
      </div>

      <div id="statusEl" class="status-text text-lg sm:text-xl"></div>

      <div id="hashtagsContainer" class="flex flex-wrap justify-center"></div>
    </div>

    <div class="glass p-6 sm:p-8 mb-8">
      <h2 class="text-xl sm:text-2xl font-medium mb-4 flex items-center gap-3 text-[rgba(220,210,255,0.92)]">
        <i data-lucide="user" class="w-6 h-6"></i>
        О себе
      </h2>
      <div id="bioEl" class="text-base sm:text-lg leading-relaxed"></div>
    </div>

    <div class="glass p-6 sm:p-8 mb-12">
      <h2 class="text-xl sm:text-2xl font-medium mb-5 flex items-center gap-3 text-[rgba(220,210,255,0.92)]">
        <i data-lucide="link" class="w-6 h-6"></i>
        Связь
      </h2>
      <div id="linksContainer" class="flex flex-wrap justify-center gap-3"></div>
    </div>

  </div>

  <footer class="footer mt-auto">
    <div class="max-w-2xl mx-auto px-5 text-center text-sm text-[rgba(190,180,230,0.8)]">
      <p>SCARLET_USER • 2026</p>
      <p class="mt-1">
        <a href="https://t.me/hubsscarlet" target="_blank">hubsscarlet</a>
      </p>
    </div>
  </footer>

</div>

<script>
// ─── КОНФИГ ────────────────────────────────────────────────
const config = {
  username: "SCARLET_USER",
  status: "Разработчик ботов и интерфейсов • Python • Telegram • Web3 #Python #Developer #Scarlet #Osint #",
  bio: `Привет. Пишу ботов, сайты, интеграции.\nЛюблю чистый код и тёмный режим.\n\nTG: @hubsscarlet\nGitHub: github.com/scarlet-dev\nПоддержка: @scarlet_support`,
  avatar: "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjFuMmZ2eWhpY3N3NXA5aDVpeDJ6aGJzOTlncHFjYnU1NHBzMnhlNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/4ilFRqgbzbx4c/giphy.gif",
  header: "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExajNseml1anhyemtkNDE2Z29lbWQxN2JhM2ZiaTB3cGFrZ2lxdWVyaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/FeVg8ViEczcxG/giphy.gif",
  background: "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExczd2OXh5Z3RhN2pxcHFiNW03NHBiNHZmc2hycWhzaTNmdnozMXFyeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aRZ4vTsHnyW6A/giphy.gif",

  verified: true,
  verifiedMessage: "Разработчик Scarlet",
  
  socialLinks: [
    { text: "Telegram", url: "https://t.me/hubsscarlet", icon: "send" },
    { text: "GitHub", url: "https://github.com/scarlet-dev", icon: "github" },
    { text: "Support", url: "https://t.me/scarlet_support", icon: "help-circle" }
  ]
};

// ─── Применение настроек ────────────────────────────────────
document.body.style.setProperty('--body-bg-image', `url('${config.background}')`);

document.getElementById("headerBg").style.backgroundImage = 
  `linear-gradient(to bottom, rgba(10,8,30,0.4), rgba(5,4,15,0.85)), url('${config.header}')`;

document.getElementById("avatarImg").src = config.avatar;

document.getElementById("usernameEl").textContent = config.username;

// Статус + хештеги с рандомными цветами
let statusText = config.status;
const hashtags = statusText.match(/#[\wа-яА-ЯёЁ]+/gi) || [];
statusText = statusText.replace(/#[\wа-яА-ЯёЁ]+/gi, '').trim();
document.getElementById("statusEl").textContent = statusText;

const colors = [
  '#a78bfa', '#7dd3fc', '#f472b6', '#6ee7b7', '#fcd34d', '#fca5a5', '#c084fc', '#60a5fa'
];

const hashtagsDiv = document.getElementById("hashtagsContainer");
hashtags.forEach(tag => {
  const clean = tag.substring(1);
  const color = colors[Math.floor(Math.random() * colors.length)];
  const span = document.createElement("span");
  span.className = "hashtag-capsule text-sm sm:text-base";
  span.style.borderColor = color + '60'; // прозрачная версия цвета
  span.style.color = color;
  span.textContent = clean;
  hashtagsDiv.appendChild(span);
});

// Био
let bioHtml = config.bio
  .replace(/\n/g, '<br>')
  .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" class="link-capsule" target="_blank">$1</a>')
  .replace(/@[\w]+/g, match => {
    const url = match === '@hubsscarlet' ? 'https://t.me/hubsscarlet' : '#';
    return `<a href="${url}" class="link-capsule" target="_blank">${match}</a>`;
  });
document.getElementById("bioEl").innerHTML = bioHtml;

// Блок связи
const linksDiv = document.getElementById("linksContainer");
config.socialLinks.forEach(link => {
  const a = document.createElement("a");
  a.href = link.url;
  a.target = "_blank";
  a.className = "link-capsule px-5 py-2.5 mx-1.5 my-1.5 text-sm sm:text-base";
  a.innerHTML = `<i data-lucide="${link.icon}" class="w-4 h-4 mr-1.5"></i>${link.text}`;
  linksDiv.appendChild(a);
});

// Верификация + уведомление
if (config.verified) {
  const badge = document.createElement("span");
  badge.innerHTML = ' <i data-lucide="check-circle" class="inline w-6 h-6 sm:w-7 sm:h-7 text-[rgba(140,120,240,0.9)] cursor-pointer verified-badge"></i>';
  badge.style.cursor = "pointer";
  badge.title = "Нажми, чтобы показать статус верификации";

  badge.addEventListener("click", () => {
    const toast = document.getElementById("toast");
    toast.innerHTML = `<i data-lucide="check-circle"></i> <span>${config.verifiedMessage}</span>`;
    toast.classList.add("show");
    lucide.createIcons({ icons: toast });

    setTimeout(() => {
      toast.classList.remove("show");
      setTimeout(() => toast.innerHTML = "", 450);
    }, 2000);
  });

  document.getElementById("usernameEl").parentNode.insertBefore(badge, document.getElementById("usernameEl").nextSibling);
}

lucide.createIcons();
</script>

</body>
</html>
